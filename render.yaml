services:
  # === Backend: Spring Boot API ===
  - type: web
    name: expense-api
    runtime: docker
    dockerContext: server
    dockerfilePath: server/Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # The database service below automatically provides connection info
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${EXPENSE_DB_HOST}:${EXPENSE_DB_PORT}/${EXPENSE_DB_NAME}
      - key: EXPENSE_DB_HOST
        fromDatabase:
          name: expense-db
          property: host
      - key: EXPENSE_DB_PORT
        fromDatabase:
          name: expense-db
          property: port
      - key: EXPENSE_DB_NAME
        fromDatabase:
          name: expense-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: expense-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: expense-db
          property: password

  # === Frontend: React Static Site ===
  - type: web
    name: expense-ui
    runtime: static
    buildCommand: npm run build
    staticPublishPath: dist
    # Root for the frontend is the client folder
    rootDir: client
    routes:
      - type: rewrite
        source: /api/*
        destination: https://expense-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: expense-db
    plan: free
    region: oregon
