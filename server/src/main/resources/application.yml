# ==============================
# Default Configuration
# ==============================
server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: expense-tracker

  # === JPA / Hibernate ===
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false

  # === Flyway ===
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # === Jackson ===
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # === Lifecycle (graceful shutdown) ===
  lifecycle:
    timeout-per-shutdown-phase: 15s

# === Actuator ===
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

# === Logging ===
logging:
  level:
    com.expensetracker: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
